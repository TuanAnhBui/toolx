<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
.t{font-size:13px;fill:#1f2733;}
.lbl{font-size:11px;fill:#8a93a0;font-weight:600;}
.arr{stroke:#5a6472;stroke-width:1.6;fill:none;}
rect{fill:#ffffff;}
.c-purple rect{fill:#f2ecfa;stroke:#6b4ea0;stroke-width:1.2;}
.c-teal rect{fill:#e6f5f3;stroke:#1f8a86;stroke-width:1.2;}
.c-coral rect{fill:#fbece9;stroke:#c75c54;stroke-width:1.2;}
.c-amber rect{fill:#fbf2dd;stroke:#b07d12;stroke-width:1.2;}
.c-blue rect{fill:#e9f1fb;stroke:#2f6fb0;stroke-width:1.2;}
.c-gray rect{fill:#eef0f3;stroke:#5a6472;stroke-width:1.2;}
.c-purple .th{fill:#3d2d63;}.c-teal .th{fill:#0f5b58;}.c-coral .th{fill:#8f352f;}.c-amber .th{fill:#7a5408;}.c-blue .th{fill:#1f4e80;}.c-gray .th{fill:#2b323d;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="40" y="40" width="600" height="52" rx="8"/><text class="th" x="340" y="62" text-anchor="middle">Invocation request</text><text class="ts" x="340" y="80" text-anchor="middle">caller identity + roles · data class of input · tool id + version</text></g>
<line x1="340" y1="92" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="40" y="120" width="290" height="58" rx="8"/><text class="th" x="185" y="142" text-anchor="middle">Role check</text><text class="ts" x="185" y="160" text-anchor="middle">caller's roles ∈ permissions.roles.allow ?</text></g>
<g class="c-coral"><rect x="349" y="120" width="290" height="58" rx="8"/><text class="th" x="494" y="142" text-anchor="middle">Data-class check</text><text class="ts" x="494" y="160" text-anchor="middle">input class ∈ data_handling.accepts ?</text></g>
<line x1="185" y1="178" x2="280" y2="208" class="arr" marker-end="url(#arrow)"/>
<line x1="494" y1="178" x2="400" y2="208" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber"><rect x="240" y="210" width="200" height="48" rx="8"/><text class="th" x="340" y="234" text-anchor="middle">Both must pass</text></g>
<line x1="340" y1="258" x2="340" y2="284" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="240" y="286" width="200" height="48" rx="8"/><text class="th" x="340" y="307" text-anchor="middle">Dispatch by binding</text><text class="ts" x="340" y="324" text-anchor="middle">internal · external · mcp · …</text></g>
</svg>
