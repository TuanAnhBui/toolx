<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
