<svg viewBox="0 0 680 372" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
.t{font-size:13px;fill:#1f2733;}
.lbl{font-size:11px;fill:#8a93a0;font-weight:600;}
.arr{stroke:#5a6472;stroke-width:1.6;fill:none;}
rect{fill:#ffffff;}
.c-purple rect{fill:#f2ecfa;stroke:#6b4ea0;stroke-width:1.2;}
.c-teal rect{fill:#e6f5f3;stroke:#1f8a86;stroke-width:1.2;}
.c-coral rect{fill:#fbece9;stroke:#c75c54;stroke-width:1.2;}
.c-amber rect{fill:#fbf2dd;stroke:#b07d12;stroke-width:1.2;}
.c-blue rect{fill:#e9f1fb;stroke:#2f6fb0;stroke-width:1.2;}
.c-gray rect{fill:#eef0f3;stroke:#5a6472;stroke-width:1.2;}
.c-purple .th{fill:#3d2d63;}.c-teal .th{fill:#0f5b58;}.c-coral .th{fill:#8f352f;}.c-amber .th{fill:#7a5408;}.c-blue .th{fill:#1f4e80;}.c-gray .th{fill:#2b323d;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="28" text-anchor="middle">Flagged failures → new test cases</text>
<path d="M491 56 V38 H189 V54" fill="none" stroke="#888780" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="44" y="56" width="290" height="56" rx="8"/><text class="th" x="189" y="80" text-anchor="middle">Developer evaluation</text><text class="ts" x="189" y="98" text-anchor="middle">offline · objective</text></g>
<g class="c-teal"><rect x="346" y="56" width="290" height="56" rx="8"/><text class="th" x="491" y="80" text-anchor="middle">User evaluation</text><text class="ts" x="491" y="98" text-anchor="middle">online · real-world</text></g>
<g class="c-blue"><rect x="44" y="128" width="290" height="56" rx="8"/><text class="th" x="189" y="152" text-anchor="middle">Test set → scored runs</text><text class="ts" x="189" y="170" text-anchor="middle">match · similarity · LLM-judge</text></g>
<g class="c-teal"><rect x="346" y="128" width="290" height="56" rx="8"/><text class="th" x="491" y="152" text-anchor="middle">Real runs → feedback</text><text class="ts" x="491" y="170" text-anchor="middle">explicit + implicit signals</text></g>
<line x1="189" y1="112" x2="189" y2="126" class="arr" marker-end="url(#arrow)"/>
<line x1="491" y1="112" x2="491" y2="126" class="arr" marker-end="url(#arrow)"/>
<line x1="189" y1="186" x2="305" y2="202" class="arr" marker-end="url(#arrow)"/>
<line x1="491" y1="186" x2="375" y2="202" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="190" y="204" width="300" height="56" rx="8"/><text class="th" x="340" y="228" text-anchor="middle">Quality scorecard</text><text class="ts" x="340" y="246" text-anchor="middle">per tool &amp; version</text></g>
<line x1="320" y1="260" x2="150" y2="286" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="260" x2="343" y2="286" class="arr" marker-end="url(#arrow)"/>
<line x1="360" y1="260" x2="536" y2="286" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="44" y="288" width="185" height="52" rx="8"/><text class="th" x="136" y="310" text-anchor="middle">Promotion gate</text><text class="ts" x="136" y="326" text-anchor="middle">experimental → stable</text></g>
<g class="c-gray"><rect x="251" y="288" width="185" height="52" rx="8"/><text class="th" x="343" y="310" text-anchor="middle">Catalog + chatbot</text><text class="ts" x="343" y="326" text-anchor="middle">ranking &amp; trust</text></g>
<g class="c-gray"><rect x="458" y="288" width="185" height="52" rx="8"/><text class="th" x="550" y="310" text-anchor="middle">Financial reporting</text><text class="ts" x="550" y="326" text-anchor="middle">quality + cost</text></g>
