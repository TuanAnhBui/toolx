<line x1="360" y1="94" x2="530" y2="156" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="53" y="160" width="175" height="56" rx="8"/><text class="th" x="140" y="181" text-anchor="middle">SDK</text><text class="ts" x="140" y="199" text-anchor="middle">Typed methods</text></g>
<g class="c-blue"><rect x="253" y="160" width="175" height="56" rx="8"/><text class="th" x="340" y="181" text-anchor="middle">Web UI</text><text class="ts" x="340" y="199" text-anchor="middle">Auto-generated forms</text></g>
<g class="c-blue"><rect x="453" y="160" width="175" height="56" rx="8"/><text class="th" x="540" y="181" text-anchor="middle">Chatbot</text><text class="ts" x="540" y="199" text-anchor="middle">Schemas as functions</text></g>
