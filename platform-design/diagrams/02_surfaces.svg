<line x1="340" y1="216" x2="340" y2="250" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="216" x2="540" y2="250" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="53" y="250" width="175" height="44" rx="8"/><text class="t" x="140" y="276" text-anchor="middle">Developers</text></g>
<g class="c-gray"><rect x="253" y="250" width="175" height="44" rx="8"/><text class="t" x="340" y="276" text-anchor="middle">Non-tech users</text></g>
<g class="c-gray"><rect x="453" y="250" width="175" height="44" rx="8"/><text class="t" x="540" y="276" text-anchor="middle">NL tool search</text></g>
