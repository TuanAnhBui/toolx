<svg viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
.t{font-size:13px;fill:#1f2733;}
.lbl{font-size:11px;fill:#8a93a0;font-weight:600;}
.arr{stroke:#5a6472;stroke-width:1.6;fill:none;}
rect{fill:#ffffff;}
.c-purple rect{fill:#f2ecfa;stroke:#6b4ea0;stroke-width:1.2;}
.c-teal rect{fill:#e6f5f3;stroke:#1f8a86;stroke-width:1.2;}
.c-coral rect{fill:#fbece9;stroke:#c75c54;stroke-width:1.2;}
.c-amber rect{fill:#fbf2dd;stroke:#b07d12;stroke-width:1.2;}
.c-blue rect{fill:#e9f1fb;stroke:#2f6fb0;stroke-width:1.2;}
.c-gray rect{fill:#eef0f3;stroke:#5a6472;stroke-width:1.2;}
.c-purple .th{fill:#3d2d63;}.c-teal .th{fill:#0f5b58;}.c-coral .th{fill:#8f352f;}.c-amber .th{fill:#7a5408;}.c-blue .th{fill:#1f4e80;}.c-gray .th{fill:#2b323d;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="lbl" x="40" y="34">CHATBOT-ASSISTED AUTHORING</text>
<g class="c-coral"><rect x="40" y="46" width="120" height="52" rx="8"/><text class="th" x="100" y="66" text-anchor="middle">Complex goal</text><text class="ts" x="100" y="84" text-anchor="middle">natural language</text></g>
<g class="c-coral"><rect x="188" y="46" width="120" height="52" rx="8"/><text class="th" x="248" y="66" text-anchor="middle">Planner</text><text class="ts" x="248" y="84" text-anchor="middle">reads catalog</text></g>
<g class="c-coral"><rect x="336" y="46" width="120" height="52" rx="8"/><text class="th" x="396" y="66" text-anchor="middle">Proposed chain</text><text class="ts" x="396" y="84" text-anchor="middle">draft app</text></g>
<g class="c-amber"><rect x="484" y="46" width="120" height="52" rx="8"/><text class="th" x="544" y="66" text-anchor="middle">Review &amp; adjust</text><text class="ts" x="544" y="84" text-anchor="middle">human in loop</text></g>
<line x1="160" y1="72" x2="184" y2="72" class="arr" marker-end="url(#arrow)"/>
<line x1="308" y1="72" x2="332" y2="72" class="arr" marker-end="url(#arrow)"/>
<line x1="456" y1="72" x2="480" y2="72" class="arr" marker-end="url(#arrow)"/>
<line x1="544" y1="98" x2="544" y2="150" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="554" y="128">save as app</text>
<text class="lbl" x="40" y="186">APP = COMPOSITE TOOL (REGISTERED LIKE ANY TOOL)</text>
<rect x="40" y="200" width="600" height="164" rx="12" fill="none" stroke="#6b4ea0" stroke-width="1.4" stroke-dasharray="5 4"/>
<text class="th" x="60" y="226" fill="#3d2d63">finance / invoice-digest</text>
<text class="ts" x="60" y="246">one input · one output · own manifest · meterable · chainable</text>
<g class="c-gray"><rect x="60" y="268" width="100" height="48" rx="8"/><text class="t" x="110" y="295" text-anchor="middle">App input</text></g>
<g class="c-teal"><rect x="196" y="268" width="110" height="48" rx="8"/><text class="th" x="251" y="288" text-anchor="middle">PDF→Excel</text><text class="ts" x="251" y="305" text-anchor="middle">extract</text></g>
<g class="c-teal"><rect x="342" y="268" width="110" height="48" rx="8"/><text class="th" x="397" y="288" text-anchor="middle">Matcher</text><text class="ts" x="397" y="305" text-anchor="middle">enrich</text></g>
<g class="c-teal"><rect x="488" y="268" width="110" height="48" rx="8"/><text class="th" x="543" y="288" text-anchor="middle">GenAI</text><text class="ts" x="543" y="305" text-anchor="middle">summarize</text></g>
<line x1="160" y1="292" x2="192" y2="292" class="arr" marker-end="url(#arrow)"/>
<line x1="306" y1="292" x2="338" y2="292" class="arr" marker-end="url(#arrow)"/>
<line x1="452" y1="292" x2="484" y2="292" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="344">each step's output maps to the next step's input — validated at save time via JSON Schema</text>
</svg>
