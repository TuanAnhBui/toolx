<svg viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
.t{font-size:13px;fill:#1f2733;}
.lbl{font-size:11px;fill:#8a93a0;font-weight:600;}
.arr{stroke:#5a6472;stroke-width:1.6;fill:none;}
rect{fill:#ffffff;}
.c-purple rect{fill:#f2ecfa;stroke:#6b4ea0;stroke-width:1.2;}
.c-teal rect{fill:#e6f5f3;stroke:#1f8a86;stroke-width:1.2;}
.c-coral rect{fill:#fbece9;stroke:#c75c54;stroke-width:1.2;}
.c-amber rect{fill:#fbf2dd;stroke:#b07d12;stroke-width:1.2;}
.c-blue rect{fill:#e9f1fb;stroke:#2f6fb0;stroke-width:1.2;}
.c-gray rect{fill:#eef0f3;stroke:#5a6472;stroke-width:1.2;}
.c-purple .th{fill:#3d2d63;}.c-teal .th{fill:#0f5b58;}.c-coral .th{fill:#8f352f;}.c-amber .th{fill:#7a5408;}.c-blue .th{fill:#1f4e80;}.c-gray .th{fill:#2b323d;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="40" y="34">Delivery phases — each ends in a demoable increment</text>
<g class="c-teal"><rect x="40" y="44" width="112" height="62" rx="8"/><text class="th" x="96" y="68" text-anchor="middle">Phase A</text><text class="ts" x="96" y="88" text-anchor="middle">Foundations</text></g>
<g class="c-teal"><rect x="162" y="44" width="112" height="62" rx="8"/><text class="th" x="218" y="68" text-anchor="middle">Phase B</text><text class="ts" x="218" y="88" text-anchor="middle">Pilot MVP</text></g>
<g class="c-teal"><rect x="284" y="44" width="112" height="62" rx="8"/><text class="th" x="340" y="68" text-anchor="middle">Phase C</text><text class="ts" x="340" y="88" text-anchor="middle">Composition</text></g>
<g class="c-teal"><rect x="406" y="44" width="112" height="62" rx="8"/><text class="th" x="462" y="68" text-anchor="middle">Phase D</text><text class="ts" x="462" y="88" text-anchor="middle">Governance</text></g>
<g class="c-amber"><rect x="528" y="44" width="112" height="62" rx="8"/><text class="th" x="584" y="68" text-anchor="middle">Phase E</text><text class="ts" x="584" y="88" text-anchor="middle">Scale → AKS</text></g>
<line x1="152" y1="75" x2="161" y2="75" class="arr" marker-end="url(#arrow)"/>
<line x1="274" y1="75" x2="283" y2="75" class="arr" marker-end="url(#arrow)"/>
<line x1="396" y1="75" x2="405" y2="75" class="arr" marker-end="url(#arrow)"/>
<line x1="518" y1="75" x2="527" y2="75" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="156">Infrastructure grows only as needed</text>
<g class="c-blue"><rect x="40" y="166" width="185" height="56" rx="8"/><text class="th" x="132" y="188" text-anchor="middle">Dev · docker-compose</text><text class="ts" x="132" y="206" text-anchor="middle">Postgres · MinIO · Redis</text></g>
<g class="c-blue"><rect x="247" y="166" width="185" height="56" rx="8"/><text class="th" x="339" y="188" text-anchor="middle">Pilot VM</text><text class="ts" x="339" y="206" text-anchor="middle">+ vector · LLM · secrets</text></g>
<g class="c-blue"><rect x="454" y="166" width="185" height="56" rx="8"/><text class="th" x="546" y="188" text-anchor="middle">Production · AKS</text><text class="ts" x="546" y="206" text-anchor="middle">managed Azure · KEDA</text></g>
<line x1="225" y1="194" x2="245" y2="194" class="arr" marker-end="url(#arrow)"/>
<line x1="432" y1="194" x2="452" y2="194" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="248">A–B run on docker-compose · B–D on the pilot VM · E on AKS</text>
</svg>
