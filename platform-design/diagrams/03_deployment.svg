<svg viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
.t{font-size:13px;fill:#1f2733;}
.lbl{font-size:11px;fill:#8a93a0;font-weight:600;}
.arr{stroke:#5a6472;stroke-width:1.6;fill:none;}
rect{fill:#ffffff;}
.c-purple rect{fill:#f2ecfa;stroke:#6b4ea0;stroke-width:1.2;}
.c-teal rect{fill:#e6f5f3;stroke:#1f8a86;stroke-width:1.2;}
.c-coral rect{fill:#fbece9;stroke:#c75c54;stroke-width:1.2;}
.c-amber rect{fill:#fbf2dd;stroke:#b07d12;stroke-width:1.2;}
.c-blue rect{fill:#e9f1fb;stroke:#2f6fb0;stroke-width:1.2;}
.c-gray rect{fill:#eef0f3;stroke:#5a6472;stroke-width:1.2;}
.c-purple .th{fill:#3d2d63;}.c-teal .th{fill:#0f5b58;}.c-coral .th{fill:#8f352f;}.c-amber .th{fill:#7a5408;}.c-blue .th{fill:#1f4e80;}.c-gray .th{fill:#2b323d;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-blue"><rect x="40" y="36" width="600" height="96" rx="10"/></g>
<text class="th" x="60" y="58">Application tier — identical images on both targets</text>
<g class="c-gray"><rect x="60" y="70" width="130" height="46" rx="7"/><text class="t" x="125" y="97" text-anchor="middle">Gateway</text></g>
<g class="c-gray"><rect x="205" y="70" width="130" height="46" rx="7"/><text class="t" x="270" y="97" text-anchor="middle">Orchestrator</text></g>
<g class="c-gray"><rect x="350" y="70" width="130" height="46" rx="7"/><text class="t" x="415" y="97" text-anchor="middle">Tool workers</text></g>
<g class="c-gray"><rect x="495" y="70" width="125" height="46" rx="7"/><text class="t" x="557" y="97" text-anchor="middle">AI services</text></g>
<line x1="340" y1="132" x2="340" y2="172" class="arr" marker-end="url(#arrow)"/>
<text class="lbl" x="350" y="158">storage / queue / vector ports</text>
<g class="c-amber"><rect x="170" y="176" width="340" height="50" rx="8"/><text class="th" x="340" y="196" text-anchor="middle">Backing services</text><text class="ts" x="340" y="214" text-anchor="middle">swapped by config: MinIO↔Blob · Redis↔Service Bus · …</text></g>
</svg>
