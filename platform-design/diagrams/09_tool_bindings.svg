<svg viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
.th{font-weight:600;font-size:14px;fill:#1f2733;}
.ts{font-size:12px;fill:#5a6472;}
.t{font-size:13px;fill:#1f2733;}
.lbl{font-size:11px;fill:#8a93a0;font-weight:600;}
.arr{stroke:#5a6472;stroke-width:1.6;fill:none;}
rect{fill:#ffffff;}
.c-purple rect{fill:#f2ecfa;stroke:#6b4ea0;stroke-width:1.2;}
.c-teal rect{fill:#e6f5f3;stroke:#1f8a86;stroke-width:1.2;}
.c-coral rect{fill:#fbece9;stroke:#c75c54;stroke-width:1.2;}
.c-amber rect{fill:#fbf2dd;stroke:#b07d12;stroke-width:1.2;}
.c-blue rect{fill:#e9f1fb;stroke:#2f6fb0;stroke-width:1.2;}
.c-gray rect{fill:#eef0f3;stroke:#5a6472;stroke-width:1.2;}
.c-purple .th{fill:#3d2d63;}.c-teal .th{fill:#0f5b58;}.c-coral .th{fill:#8f352f;}.c-amber .th{fill:#7a5408;}.c-blue .th{fill:#1f4e80;}.c-gray .th{fill:#2b323d;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="140" y="40" width="400" height="52" rx="8"/><text class="th" x="340" y="64" text-anchor="middle">Tool manifest — one contract</text><text class="ts" x="340" y="82" text-anchor="middle">description + I/O schema · binding-agnostic</text></g>
<line x1="340" y1="92" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="140" y="120" width="400" height="52" rx="8"/><text class="th" x="340" y="144" text-anchor="middle">Orchestrator</text><text class="ts" x="340" y="162" text-anchor="middle">dispatches by binding</text></g>
<line x1="340" y1="172" x2="340" y2="202" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="204" width="600" height="180" rx="12" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4"/>
<text class="ts" x="58" y="224">Binding types — how the tool executes</text>
<g class="c-teal"><rect x="58" y="240" width="170" height="52" rx="8"/><text class="th" x="143" y="262" text-anchor="middle">Internal worker</text><text class="ts" x="143" y="280" text-anchor="middle">in-repo code · today</text></g>
<g class="c-teal"><rect x="253" y="240" width="170" height="52" rx="8"/><text class="th" x="338" y="262" text-anchor="middle">External API</text><text class="ts" x="338" y="280" text-anchor="middle">remote HTTP · adding</text></g>
<g class="c-teal"><rect x="448" y="240" width="170" height="52" rx="8"/><text class="th" x="533" y="262" text-anchor="middle">MCP server</text><text class="ts" x="533" y="280" text-anchor="middle">AI tool protocol</text></g>
<g class="c-teal"><rect x="58" y="308" width="170" height="52" rx="8"/><text class="th" x="143" y="330" text-anchor="middle">Hosted sandbox</text><text class="ts" x="143" y="348" text-anchor="middle">BYO container</text></g>
<g class="c-teal"><rect x="253" y="308" width="170" height="52" rx="8"/><text class="th" x="338" y="330" text-anchor="middle">Prompt tool</text><text class="ts" x="338" y="348" text-anchor="middle">LLM · no code</text></g>
<g class="c-teal"><rect x="448" y="308" width="170" height="52" rx="8"/><text class="th" x="533" y="330" text-anchor="middle">Human task</text><text class="ts" x="533" y="348" text-anchor="middle">person in the loop</text></g>
</svg>
